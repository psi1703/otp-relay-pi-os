  <style>
    :root { --bg:#24282f; --panel:#111827; --text:#f8fafc; --muted:#cbd5e1; --line:rgba(255,255,255,.18); --accent:#38bdf8; --shadow:0 24px 70px rgba(0,0,0,.35); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at top,#374151 0,var(--bg) 42%,#111827 100%); color:var(--text); }

    .sub { margin:0; color:var(--muted); line-height:1.5; }
    .badge { border:1px solid var(--line); border-radius:999px; padding:8px 12px; color:var(--muted); white-space:nowrap; background:rgba(255,255,255,.06); }
    .diagram-card { background:rgba(17,24,39,.72); border:1px solid var(--line); border-radius:22px; padding:16px; box-shadow:var(--shadow); overflow:auto; }
    .diagram-card svg { display:block; width:100%; min-width:680px; height:auto; }
    svg .arch-node, svg g[onclick] { cursor:pointer; outline:none; }
    svg .arch-node:hover rect, svg g[onclick]:hover rect { filter:brightness(1.18); stroke-width:1.3px !important; }
    svg .arch-node:focus-visible rect { stroke:var(--accent) !important; stroke-width:2px !important; }
    .tip { position:fixed; z-index:50; width:min(420px,calc(100vw - 28px)); background:rgba(15,23,42,.98); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:16px 16px 14px; display:none; }
    .tip.open { display:block; }
    .tip-head { display:flex; justify-content:space-between; align-items:start; gap:12px; }
    .tip-kicker { color:var(--accent); font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px; }
    .tip-title { margin:0; font-size:19px; line-height:1.2; }
    .tip-body { color:var(--muted); line-height:1.55; margin:12px 0 0; }
    .tip-close { width:34px; height:34px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); cursor:pointer; font-size:20px; line-height:1; }
    .tip-close:hover { background:rgba(255,255,255,.13); }
    .tip-footer { margin-top:13px; padding-top:12px; border-top:1px solid var(--line); color:#94a3b8; font-size:12px; }
    @media (max-width:720px) { .hero { align-items:start; flex-direction:column; } .diagram-card { padding:10px; border-radius:16px; } .tip { left:14px !important; right:14px !important; bottom:14px !important; top:auto !important; } }
  </style>

  <aside id="archTip" class="tip" role="dialog" aria-modal="false" aria-labelledby="archTipTitle">
    <div class="tip-head"><div><div class="tip-kicker">Component note</div><h2 id="archTipTitle" class="tip-title"></h2></div><button class="tip-close" type="button" aria-label="Close" onclick="closeArchTip()">&times;</button></div>

  <script>
    const ARCH_TIPS = {
      "What does the git clone step do during install?": [
            "git clone",
            "Copies the repository onto the Raspberry Pi so the installer can use the tracked scripts, frontend files, service templates, docs, and deployment tooling as the source for /opt/otp-relay."
      ],
      "What does install.sh do step by step?": [
            "sudo bash install.sh",
            "Bootstraps a fresh Pi: prepares directories, installs packages, creates the service user, builds the Python virtual environment, installs services, configures nginx/TLS, deploys frontend files, and prepares the app for systemd startup."
      ],
      "Why is .git removed from /opt/otp-relay during install?": [
            "Remove .git",
            "The live application directory is treated as a deployed runtime tree, not a working Git checkout. Removing .git prevents accidental local Git operations and keeps updates flowing through the controlled deployment scripts."
      ],
      "What packages does install.sh install?": [
            "System packages",
            "Installs the OS dependencies required by the portal and relay service, typically Python, venv support, nginx, systemd integration utilities, and supporting packages needed by the app and deployment scripts."
      ],
      "What does the otprelay system user do?": [
            "otprelay user",
            "Runs the application services with limited privileges instead of root. This keeps runtime ownership and service permissions separated from install/deploy administration."
      ],
      "What goes into the Python venv?": [
            "Python virtual environment",
            "Contains the Python runtime dependencies for the relay API and monitor, isolated from the system Python packages so updates are predictable and reversible."
      ],
      "How does install.sh configure nginx and TLS?": [
            "nginx and TLS",
            "Installs or updates the nginx site configuration used to serve the portal and proxy API traffic. TLS material is placed in the expected system path and nginx is reloaded after validation."
      ],
      "What systemd units does install.sh register?": [
            "systemd services",
            "Registers otp-relay and otp-monitor as managed services so they can start on boot, restart on failure, and be controlled by deploy scripts or the runner."
      ],
      "What values must I set in .env before starting services?": [
            ".env configuration",
            "Stores environment-specific settings and secrets such as mail/OTP settings, admin/auth configuration, runtime paths, and other values that should not be hard-coded into application code."
      ],
      "How do I set up the GitHub Actions runner on the Pi?": [
            "Self-hosted runner",
            "Installs and registers the GitHub Actions runner on the Pi so repository workflow jobs can deploy application code, portal UI, help docs, and server config directly onto the live host."
      ],
      "How do I start otp-relay and otp-monitor?": [
            "Start services",
            "After install/configuration, systemd starts otp-relay for the web/API portal and otp-monitor for background monitoring. Use systemctl status/restart to inspect or recover them."
      ],
      "What does main.py do in otp-relay?": [
            "main.py",
            "Provides the main OTP Relay backend: HTTP routes, portal API endpoints, slot/OTP handling, auth/status behavior, and the service entrypoint used by systemd."
      ],
      "What does monitor.py do?": [
            "monitor.py",
            "Runs the background monitor process. It watches the relay environment and supports operational checks or background tasks that should run outside the main web request path."
      ],
      "What is in the frontend folder?": [
            "frontend/",
            "Contains the browser UI served by the portal: app.jsx, style.css, static assets, generated help output, and the user-facing RTA Wizard interface."
      ],
      "What is in frontend/help/?": [
            "frontend/help/",
            "Generated help output served under /help/. It includes wizard-guide.json for the RTA floating guide, rendered reference pages, the manifest, and copied screenshot assets."
      ],
      "What runtime data lives in data/?": [
            "data/",
            "Holds runtime state files used by the application, such as local JSON/database-style state, audit/runtime records, and generated or mutable service data."
      ],
      "What is in the venv?": [
            "venv/",
            "The isolated Python environment used by otp-relay and otp-monitor. Deployments can refresh dependencies without mixing them into system Python."
      ],
      "What secrets go in .env?": [
            ".env secrets",
            "Environment-specific values that should not be committed: credentials, tokens, hostnames, mail settings, admin setup, and other deployment-only configuration."
      ],
      "What do the systemd service units do?": [
            "systemd units",
            "Define how Linux starts, stops, restarts, and supervises otp-relay and otp-monitor, including user, working directory, environment file, and restart policy."
      ],
      "How is nginx configured for otp-relay?": [
            "nginx config",
            "nginx serves the portal frontend and routes backend/API traffic to the local otp-relay service. It is the public HTTP/TLS edge for the Pi deployment."
      ],
      "Where is the TLS certificate stored?": [
            "TLS certificate",
            "TLS certificate and key files live in the system certificate path expected by the nginx site configuration. Keep them readable by nginx and protected from normal users."
      ],
      "Where does the GitHub Actions runner live on the Pi?": [
            "actions-runner/",
            "The self-hosted runner is installed under the runner user home, commonly ~/actions-runner, and executes workflow jobs against a checked-out workspace."
      ],
      "How does the GitHub push trigger the deployment pipeline?": [
            "GitHub push",
            "A push to main triggers workflows based on changed paths. Application code, portal UI, help docs, and server config can each deploy through separate lanes."
      ],
      "How does the self-hosted runner pick up the workflow job?": [
            "Runner job pickup",
            "The Pi runner polls GitHub for eligible jobs matching its labels. When a matching workflow is queued, the runner checks out the repo and executes the job steps locally on the Pi."
      ],
      "What does the deploy-application-code workflow do?": [
            "deploy-application-code",
            "Deploys backend/application files and dependencies, then restarts or reloads the relevant services so code changes take effect safely."
      ],
      "What does the deploy-portal-ui workflow do?": [
            "deploy-portal-ui",
            "Deploys frontend portal files such as app.jsx, style.css, and static assets to the live frontend directory used by the web server."
      ],
      "What does the deploy-help-docs workflow do?": [
            "deploy-help-docs",
            "Builds docs/help markdown and assets into frontend/help, including wizard-guide.json, then syncs that generated output into /opt/otp-relay/frontend/help/."
      ],
      "What does the deploy-server-config workflow do?": [
            "deploy-server-config",
            "Deploys server-side configuration such as nginx/systemd templates or operational scripts, validates configuration, and reloads affected services when safe."
      ],
      "How does deploy_application_code.py work?": [
            "deploy_application_code.py",
            "Performs the controlled backend sync from the repository workspace to /opt/otp-relay, preserves deployment-specific files, updates dependencies when required, and coordinates service restart."
      ],
      "How does deploy_portal_ui.py work?": [
            "deploy_portal_ui.py",
            "Copies the portal UI bundle from the repo into the live frontend directory and avoids touching unrelated runtime/backend files."
      ],
      "How does the help docs rsync work?": [
            "Help docs rsync",
            "After build_help_docs.py generates frontend/help, rsync --delete makes /opt/otp-relay/frontend/help match it exactly. Anything not generated from the repo is removed."
      ],
      "How does deploy_server_config.py work?": [
            "deploy_server_config.py",
            "Applies approved server config changes, usually with validation before reload. It keeps service/nginx configuration updates separate from normal app/UI deploys."
      ],
      "What files get updated in /opt/otp-relay during deployment?": [
            "Live files",
            "Only files targeted by the specific deployment lane should change. Backend deploys update app code, UI deploys update frontend assets, help deploys update frontend/help, and config deploys update server configuration."
      ],
      "What sudo permissions does the runner need for systemd and nginx?": [
            "Runner sudo permissions",
            "The runner needs narrowly scoped sudo rights for controlled commands such as restarting otp-relay/otp-monitor, validating nginx, reloading nginx, and syncing approved deployment paths."
      ],
      "How does deploy_users.sh reload the user list without restarting?": [
            "deploy_users.sh",
            "Updates the user list/configuration and asks the running service to reload or re-read that data so user changes can apply without a full portal restart."
      ]
};
    function showArchTip(event, prompt) {
      if (event) event.stopPropagation();
      const tip = document.getElementById('archTip');
      const title = document.getElementById('archTipTitle');
      const body = document.getElementById('archTipBody');
      const info = ARCH_TIPS[prompt] || [prompt, 'No description has been configured for this item yet.'];
      title.textContent = info[0];
      body.textContent = info[1];
      tip.classList.add('open');
      const margin = 14;
      const clickX = event ? event.clientX : window.innerWidth / 2;
      const clickY = event ? event.clientY : window.innerHeight / 2;
      tip.style.left = '0px';
      tip.style.top = '0px';
      const rect = tip.getBoundingClientRect();
      let left = clickX + 18;
      let top = clickY + 18;
      if (left + rect.width + margin > window.innerWidth) left = window.innerWidth - rect.width - margin;
      if (top + rect.height + margin > window.innerHeight) top = window.innerHeight - rect.height - margin;
      if (left < margin) left = margin;
      if (top < margin) top = margin;
      tip.style.left = left + 'px';
      tip.style.top = top + 'px';
    }
    function closeArchTip() { document.getElementById('archTip').classList.remove('open'); }
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeArchTip();
      if ((event.key === 'Enter' || event.key === ' ') && event.target?.classList?.contains('arch-node')) {
        event.preventDefault();
        event.target.dispatchEvent(new MouseEvent('click', { bubbles:true, clientX:window.innerWidth/2, clientY:window.innerHeight/2 }));
      }
    });
  </script>
